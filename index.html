<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="Images/icon card.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />

    <title>Memory Card Game</title>
  </head>
  <body>
    <div class="container">
      <h1 class="text-center">Memory Card Game</h1>

      <div class="settings">
        <div class="setting">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter your name" />
        </div>

        <div class="setting">
          <label>Max Retries</label>
          <input type="number" id="maxRetries" min="1" value="10" />
        </div>

        <div class="setting row">
          <label>
            <input type="checkbox" id="toggleTimer" checked />
            Timer
          </label>

          <input
            type="number"
            id="timerDuration"
            value="60"
            min="10"
            class="timer-input"
          />
          <h3 class="text-center mb-4" id="timer">Time 1:00</h3>
        </div>

        <div class="stats">
          <p id="moves">Moves: 0</p>
          <p id="mistakes">Mistakes: 0</p>
          <p id="misses">Misses: 0</p>
        </div>

        <button class="hintBtn" onclick="GameUI.useHint()">Show Cards</button>
      </div>

      <div class="wrapper" id="wrapper">
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
        <div class="card">
          <div class="card-front"></div>
          <div class="card-back"></div>
        </div>
      </div>

      <div
        class="d-flex flex-column justify-content-center align-items-center position-absolute w-100 h-100"
        id="gameOverContainer"
      >
        <h2 class="gameOver"></h2>
        <button class="btn btn-primary mt-4" id="restart">Play Again</button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
